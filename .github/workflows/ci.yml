name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  RunMake:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go make
      - name: Build program
        run: |
          make build
          mkdir -p usr/bin
          cp max_unique_element usr/bin/
          chmod +x usr/bin/max_unique_element
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-program
          path: usr/bin/max_unique_element
          retention-days: 1

  RunTest:
    needs: RunMake
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: built-program
          path: ./usr/bin
      - run: chmod +x ./usr/bin/max_unique_element
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run tests
        run: |
          cd cicd
          go run test1.go
          go run test2.go
          go run test3.go

  RunPackage:
    needs: RunTest
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: built-program
          path: ./usr/bin
      - name: Build .deb package
        run: |
          mkdir -p DEBIAN
          cp control DEBIAN/control
          dpkg-deb --build . go.deb
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: "go.deb"
          retention-days: 1

  test-docker:
    needs: RunPackage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download deb package
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: .
      - name: Build Docker image
        run: docker build -t myapp-test .
      - name: Build Docker image with tag
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest
      - name: Save Docker image to dist folder (локальный артефакт)
        run: |
          mkdir -p dist
          docker save myapp-test:latest -o dist/myapp-container.tar
          gzip -f dist/myapp-container.tar
          echo "Локальный артефакт контейнера создан:"
          ls -la dist/
      - name: Upload container artifact to dist
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: dist/myapp-container.tar.gz
          retention-days: 1
